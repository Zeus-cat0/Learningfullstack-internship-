<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="../bootstrap-5.0.2-dist/css/bootstrap.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="signin.css">
</head>
<body class="SignIn-body">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-12 col-sm-10 col-md-8 col-lg-5">

                <div class="card Signin-card">

                    <div class="card-body">

                        <img src="../assests/image.png"
                             alt="Logo"
                             class="img-fluid signin-img">

                        <form class="signin-form">

                            <div class="mb-3">
                                <input
                                    type="email"
                                    class="form-control"
                                    id="emailInput"
                                    placeholder="Email">
                            </div>

                            <div class="mb-3">
                                <input
                                    type="password"
                                    class="form-control"
                                    id="passwordInput"
                                    placeholder="Password">
                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn signin-btn btn-lg">
                                    Sign In
                                </button>
                            </div>

                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                                <label class="form-check-label" for="checkDefault">
                                    Remember me <a href="#" class="text-decoration-none">Need Help ?</a>
                                </label>
                            </div>

                        </form>

                    </div>
                    
                </div>

                    <a href="#" class=" text-decoration-none create-new-account"> Create new account</a>


            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="../bootstrap-5.0.2-dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
